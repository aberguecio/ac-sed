services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env

  cron:
    image: alpine:3.19
    restart: unless-stopped
    depends_on:
      - web
    env_file: .env
    command: >
      sh -c "
        apk add --no-cache curl &&
        echo '0 8 * * 1 curl -s -H \"X-Cron-Secret: $${CRON_SECRET}\" http://web:3000/api/cron >> /var/log/cron.log 2>&1' | crontab - &&
        crond -f -l 6
      "

volumes:
  pgdata:
